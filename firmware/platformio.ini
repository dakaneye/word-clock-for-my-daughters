[platformio]
default_envs = emory, nora
src_dir = src
lib_dir = lib
test_dir = test

; Shared flags only. Platform/framework/board/deps belong in each env
; so the `native` env doesn't drag in Arduino-only libraries.
[env]
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra

[esp32-base]
platform = espressif32@^6.8.0
framework = arduino
board = esp32dev
lib_ldf_mode = deep+
; Arduino-ESP32 8.x appends -std=gnu++11 after our -std=gnu++17 (last-wins),
; silently downgrading ESP32 builds to C++11. Strip the framework's flag so
; our -std=gnu++17 from [env] stays authoritative.
build_unflags = -std=gnu++11
build_flags =
    ${env.build_flags}
    -I configs
lib_deps =
    fastled/FastLED@^3.7.0
    adafruit/RTClib@^2.1.4
    arduino-libraries/NTPClient@^3.2.1
extra_scripts =
    pre:scripts/pio_generate_captive_html.py

[env:emory]
extends = esp32-base
build_flags = ${esp32-base.build_flags} -D CLOCK_TARGET_EMORY=1 -include config_emory.h

[env:nora]
extends = esp32-base
build_flags = ${esp32-base.build_flags} -D CLOCK_TARGET_NORA=1 -include config_nora.h

[env:native]
platform = native
test_framework = unity
build_flags =
    ${env.build_flags}
    -I lib/core/include
    -I lib/wifi_provision/include
    -I lib/buttons/include
    -I lib/display/include
    -I lib/rtc/include
build_src_filter =
    +<../lib/core/src/*>
    +<../lib/wifi_provision/src/state_machine.cpp>
    +<../lib/wifi_provision/src/form_parser.cpp>
    +<../lib/wifi_provision/src/credential_validator.cpp>
    +<../lib/wifi_provision/src/tz_options.cpp>
    +<../lib/buttons/src/debouncer.cpp>
    +<../lib/buttons/src/combo_detector.cpp>
    +<../lib/display/src/led_map.cpp>
    +<../lib/display/src/palette.cpp>
    +<../lib/display/src/rainbow.cpp>
    +<../lib/display/src/renderer.cpp>
lib_compat_mode = off
