; 440 Hz tone test for breadboard Step 4 (MAX98357A + speaker on I²S).
; Uses the legacy driver/i2s.h API (matches espressif32@6.8.0 / Arduino-ESP32 2.x).

[env:esp32]
platform = espressif32@6.8.0
framework = arduino
board = esp32dev
monitor_speed = 115200
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
