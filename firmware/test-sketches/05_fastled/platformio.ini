; FastLED 1-LED test for breadboard Step 5 (WS2812B through 74HCT245 level shifter).
; NUM_LEDS=1 — only the first LED of the strip lights up; rest stay dark.

[env:esp32]
platform = espressif32@6.8.0
framework = arduino
board = esp32dev
monitor_speed = 115200
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
lib_deps = fastled/FastLED@^3.7.0
