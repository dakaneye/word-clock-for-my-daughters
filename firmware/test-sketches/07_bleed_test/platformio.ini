; Diffuser-stack bleed test — holds one WS2812B at full white brightness so
; the printed `light_channel_test_pocket` (enclosure/3d/) can be placed over
; the LED and the lateral light spread observed under controlled conditions.
;
; Same wiring as 05_fastled (WS2812B data on GPIO 13 through 74HCT245 level
; shifter); different sketch — steady-on instead of color cycle.

[env:esp32]
platform = espressif32@6.8.0
framework = arduino
board = esp32dev
monitor_speed = 115200
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
lib_deps = fastled/FastLED@^3.7.0
