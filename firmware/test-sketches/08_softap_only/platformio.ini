; SoftAP-only sketch — isolates the WiFi current draw from every other
; peripheral. If serial garbles when this runs, the failure is brownout
; on the 3V3 rail during WiFi TX bursts, not a firmware bug in the
; full word-clock app.

[env:esp32]
platform = espressif32@6.8.0
framework = arduino
board = esp32dev
monitor_speed = 115200
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
